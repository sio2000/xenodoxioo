[build]
  command = "pnpm install && pnpm run build:client"
  functions = "netlify/functions"
  publish = "dist/spa"
  environment = { NODE_ENV = "production" }

[functions]
  external_node_modules = ["express", "serverless-http"]
  node_bundler = "esbuild"

# API: rewrite /api/* to serverless function (must come first)
[[redirects]]
  force = true
  from = "/api/*"
  status = 200
  to = "/.netlify/functions/api/:splat"

# Uploads: proxy to API function so /uploads/* images work
[[redirects]]
  force = true
  from = "/uploads/*"
  status = 200
  to = "/.netlify/functions/api/uploads/:splat"

# SPA fallback: routes without a matching file serve index.html (fixes /admin, /about, /contact)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
