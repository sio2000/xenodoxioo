# Render Blueprint - Backend API for leonidion-houses.com
# Deploy: Connect repo and Render will use this config

services:
  - type: web
    name: leonidion-houses-api
    runtime: node

    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Add these in Render Dashboard → Environment (sensitive):
      # - SUPABASE_URL
      # - SUPABASE_SERVICE_ROLE_KEY
      # - STRIPE_SECRET_KEY (sk_test_xxx for test mode)
      # - STRIPE_PUBLISHABLE_KEY (pk_test_xxx)
      # - STRIPE_WEBHOOK_SECRET (whsec_xxx from Stripe webhook)
      # - RESEND_API_KEY
      # - FRONTEND_URL = https://www.leonidion-houses.com
      # - API_URL = https://leonidion-houses-api.onrender.com (your service URL)
      # - JWT_SECRET
      # - JWT_REFRESH_SECRET
      # - ADMIN_EMAIL
      # - FROM_EMAIL (must be verified in Resend)
